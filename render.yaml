# Render blueprint reference — PrepForge Chess SaaS (FastAPI + managed Postgres).
#
# NOTE: preDeployCommand and managed databases require Render paid plans.
# Free-tier deployments: set DATABASE_URL + PREPFORGE_ALLOWED_ORIGINS manually
# in the dashboard. Migrations run via the Dockerfile CMD (alembic upgrade head
# before uvicorn), so no preDeployCommand is needed.
databases:
  - name: prepforge-chess-db
    plan: free

services:
  - type: web
    name: prepforge-chess
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PREPFORGE_ENV
        value: production
      # Set in the Render dashboard — never commit this value.
      - key: PREPFORGE_SECRET_KEY
        sync: false
      # Set manually in the dashboard with your Postgres Internal Database URL.
      # config.py auto-pins postgres:// -> postgresql+psycopg:// (psycopg v3).
      - key: DATABASE_URL
        sync: false
      # Placeholder — the live deploy overrides this in the Render dashboard with
      # its actual service URL (e.g. https://prepforge-w0c5.onrender.com). Update
      # this value too if you ever recreate the service from this blueprint.
      - key: PREPFORGE_ALLOWED_ORIGINS
        value: https://prepforge-chess.onrender.com
